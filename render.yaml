services:
  # ── Backend Service (Express API) ──────────────────────────────────
  - type: web
    name: crabs-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://crabs-frontend.onrender.com
      - key: BACKEND_URL
        value: https://crabs-backend.onrender.com
      - key: PORT
        value: 5000

  # ── Frontend Service (Next.js) ─────────────────────────────────────
  - type: web
    name: crabs-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://crabs-backend.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PORT
        value: 3000
